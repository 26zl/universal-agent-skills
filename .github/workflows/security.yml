name: Scan skills

on:
  pull_request:
    paths:
      - "skills/**"
      - "profiles/**"
      - "scripts/sync_agent_stack.py"
      - "scripts/sync_instructions.py"
      - "scripts/sync_opencode_config.py"
      - "requirements-security.txt"
      - "requirements-cisco.txt"
      - ".github/workflows/security.yml"
  push:
    branches: [main]
    paths:
      - "skills/**"
      - "profiles/**"
      - "scripts/sync_agent_stack.py"
      - "scripts/sync_instructions.py"
      - "scripts/sync_opencode_config.py"
      - "requirements-security.txt"
      - "requirements-cisco.txt"
      - ".github/workflows/security.yml"
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cisco-skill-scanner:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-cisco.txt

      - name: Install pinned Skill Scanner
        run: python -m pip install --disable-pip-version-check -r requirements-cisco.txt

      - name: Run strict behavioral scan
        run: >-
          skill-scanner scan-all skills
          --recursive
          --use-behavioral
          --policy strict
          --fail-on-severity high
          --format sarif
          --output cisco-skill-scanner.sarif

      - name: Materialize commit-pinned portable skills
        run: >-
          HOME="$RUNNER_TEMP/uas-home"
          UAS_HOME="$RUNNER_TEMP/uas-home"
          UAS_SOURCE_CACHE="$RUNNER_TEMP/uas-sources"
          python scripts/sync_agent_stack.py --component skills --apply

      - name: Scan commit-pinned portable skills
        run: >-
          skill-scanner scan-all "$RUNNER_TEMP/uas-home/.agents/skills"
          --recursive
          --use-behavioral
          --policy strict
          --fail-on-severity high
          --format sarif
          --output cisco-external-skills.sarif

      - name: Upload SARIF
        if: >-
          always() &&
          (github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@4187e74d05793876e9989daffde9c3e66b4acd07 # v3
        with:
          sarif_file: cisco-skill-scanner.sarif
          category: cisco-skill-scanner

      - name: Upload external-skill SARIF
        if: >-
          always() &&
          (github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@4187e74d05793876e9989daffde9c3e66b4acd07 # v3
        with:
          sarif_file: cisco-external-skills.sarif
          category: cisco-external-skills

  nvidia-skillspector:
    name: SkillSpector (${{ matrix.skill }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        skill: [coding-style, simplify-code, surgical-implementation, verify-changes]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-security.txt

      - name: Install pinned SkillSpector
        run: python -m pip install --disable-pip-version-check -r requirements-security.txt

      - name: Scan without external LLM calls
        run: >-
          skillspector scan "skills/${{ matrix.skill }}"
          --no-llm
          --format sarif
          --output "skillspector-${{ matrix.skill }}.sarif"

      - name: Upload SARIF
        if: >-
          always() &&
          (github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@4187e74d05793876e9989daffde9c3e66b4acd07 # v3
        with:
          sarif_file: "skillspector-${{ matrix.skill }}.sarif"
          category: "skillspector-${{ matrix.skill }}"

  nvidia-external-skillspector:
    name: SkillSpector (external ${{ matrix.skill }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        skill: [karpathy-guidelines, humanizer, frontend-design]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-security.txt

      - name: Install pinned SkillSpector
        run: python -m pip install --disable-pip-version-check -r requirements-security.txt

      - name: Materialize commit-pinned portable skills
        run: >-
          HOME="$RUNNER_TEMP/uas-home"
          UAS_HOME="$RUNNER_TEMP/uas-home"
          UAS_SOURCE_CACHE="$RUNNER_TEMP/uas-sources"
          python scripts/sync_agent_stack.py --component skills --apply

      - name: Scan without external LLM calls
        run: >-
          skillspector scan "$RUNNER_TEMP/uas-home/.agents/skills/${{ matrix.skill }}"
          --no-llm
          --format sarif
          --output "skillspector-external-${{ matrix.skill }}.sarif"

      - name: Upload SARIF
        if: >-
          always() &&
          (github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@4187e74d05793876e9989daffde9c3e66b4acd07 # v3
        with:
          sarif_file: "skillspector-external-${{ matrix.skill }}.sarif"
          category: "skillspector-external-${{ matrix.skill }}"
