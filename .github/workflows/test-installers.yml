name: Test installers

on:
  pull_request:
    paths:
      - "install.*"
      - "bootstrap.*"
      - "adapters/**"
      - "profiles/**"
      - "skills/**"
      - "scripts/sync_agent_stack.py"
      - "scripts/test-install.*"
      - ".github/workflows/test-installers.yml"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  posix:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - run: ./scripts/test-install.sh

  windows:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - shell: pwsh
        run: ./scripts/test-install.ps1
