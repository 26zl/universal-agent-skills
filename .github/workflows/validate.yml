name: Validate

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  skills:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-validation.txt

      - name: Install specification validator
        run: python -m pip install --disable-pip-version-check -r requirements-validation.txt

      - name: Validate repository
        run: python scripts/validate.py

      - name: Test agent stack planner
        run: python scripts/test_sync_agent_stack.py

      - name: Test managed global instructions
        run: python scripts/test_sync_instructions.py

      - name: Test OpenCode config merge
        run: python scripts/test_sync_opencode_config.py

      - name: Validate Agent Skills specification
        shell: bash
        run: |
          set -euo pipefail
          for skill in skills/*; do
            agentskills validate "$skill"
          done

      - name: Parse shell scripts
        run: sh -n install.sh bootstrap.sh scripts/test-install.sh

      - name: Lint shell scripts
        run: shellcheck install.sh bootstrap.sh scripts/test-install.sh

      - name: Parse PowerShell scripts
        shell: pwsh
        run: |
          $errors = @()
          foreach ($path in @("install.ps1", "bootstrap.ps1", "scripts/test-install.ps1")) {
            $tokens = $null
            $parseErrors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $path),
              [ref]$tokens,
              [ref]$parseErrors
            )
            $errors += $parseErrors
          }
          if ($errors.Count -gt 0) {
            $errors | Format-List | Out-String | Write-Error
          }

      - name: Lint PowerShell scripts
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -RequiredVersion 1.25.0 -Scope CurrentUser -Force
          $findings = foreach ($path in @("install.ps1", "bootstrap.ps1", "scripts/test-install.ps1")) {
            Invoke-ScriptAnalyzer -Path $path -Severity Warning,Error
          }
          if ($findings) {
            $findings | Format-Table -AutoSize | Out-String | Write-Error
          }
